name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  PYTHON_VERSION: "3.11"
  GOLANGCI_LINT_VERSION: "v2.5.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Lint enforces ADR 0012 (Go Report Card A+ floor)
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (golangci-lint A+ enforcement)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  # ─────────────────────────────────────────────────────────────────────
  # Go Report Card grade check (separate from golangci-lint)
  # ─────────────────────────────────────────────────────────────────────
  reportcard:
    name: Go Report Card (A+ required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install goreportcard-cli
        run: go install github.com/gojp/goreportcard/cmd/goreportcard-cli@latest

      - name: Run goreportcard-cli
        run: |
          set -e
          OUTPUT=$(goreportcard-cli -v)
          echo "$OUTPUT"
          GRADE=$(echo "$OUTPUT" | grep -oP 'Grade:\s*\K[A-F][+]?')
          echo "Detected grade: $GRADE"
          if [ "$GRADE" != "A+" ]; then
            echo "::error::Go Report Card grade is $GRADE; A+ required (see ADR 0012)"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Tests (ADR 0011: TDD with coverage floor per phase)
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leoflow
          POSTGRES_PASSWORD: leoflow
          POSTGRES_DB: leoflow_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://leoflow:leoflow@localhost:5432/leoflow_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Enforce coverage floor
        run: |
          # The floor adapts per phase. Phase 1: 70%. Update when entering new phase.
          FLOOR=70
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}% (floor: ${FLOOR}%)"
          AWK_RESULT=$(awk -v t="$TOTAL" -v f="$FLOOR" 'BEGIN { print (t < f) }')
          if [ "$AWK_RESULT" = "1" ]; then
            echo "::error::Coverage ${TOTAL}% is below floor ${FLOOR}% (see ADR 0011)"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out

  # ─────────────────────────────────────────────────────────────────────
  # TDD discipline check: every new exported function in production code
  # must have a corresponding test added or modified in the same PR.
  # This is a best-effort heuristic; reviewers verify the spirit of ADR 0011.
  # ─────────────────────────────────────────────────────────────────────
  tdd-check:
    name: TDD discipline (commit pattern check)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify test commits exist for production changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PROD_FILES=$(git diff --name-only "$BASE" "$HEAD" -- '*.go' ':!*_test.go' ':!vendor/*' ':!proto/*' | wc -l)
          TEST_FILES=$(git diff --name-only "$BASE" "$HEAD" -- '*_test.go' | wc -l)
          echo "Production .go files changed: $PROD_FILES"
          echo "Test .go files changed: $TEST_FILES"
          if [ "$PROD_FILES" -gt 0 ] && [ "$TEST_FILES" -eq 0 ]; then
            echo "::warning::Production code changed without test changes. Verify ADR 0011 was followed."
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Build all binaries
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/leoflow ./cmd/leoflow
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/leoflow-server ./cmd/leoflow-server
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/leoflow-agent ./cmd/leoflow-agent

      - name: Check agent binary size (<20MB per ADR 0004)
        run: |
          SIZE=$(stat -c%s bin/leoflow-agent)
          MAX=20971520  # 20 MB
          echo "leoflow-agent size: $SIZE bytes (max: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::leoflow-agent exceeds 20MB cap (see ADR 0004)"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Validate OpenAPI spec (ADR 0013)
  # ─────────────────────────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI spec lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install redocly CLI
        run: npm install -g @redocly/cli@latest

      - name: Lint OpenAPI spec
        run: redocly lint docs/api/openapi.yaml

  # ─────────────────────────────────────────────────────────────────────
  # Python parser tests
  # ─────────────────────────────────────────────────────────────────────
  python-parser:
    name: Python parser tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parser
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v --cov=leoflow_parser --cov-fail-under=70
