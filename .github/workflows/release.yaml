name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # For creating releases
  packages: write       # For pushing images to GHCR
  id-token: write       # For cosign keyless signing

env:
  GO_VERSION: "1.26.3"
  REGISTRY: ghcr.io

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ── Sigstore cosign for keyless signing ──
      # Pin cosign to the 2.4.x line: cosign 3.x changed `sign-blob` to write a
      # Sigstore bundle by default, which breaks GoReleaser's
      # --output-signature/--output-certificate recipe ("create bundle file:
      # open : no such file or directory").
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.3

      # ── syft for SBOM generation ──
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      # ── QEMU + Buildx so the arm64 control-plane image builds on the amd64 runner ──
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Bake the pre-alpha expiry: build time + 90 days (UTC, RFC3339) ──
      # internal/version reads this via the expiresAt ldflag; an empty value
      # would mean "no expiry", so this step must run before GoReleaser.
      - name: Compute alpha expiry
        run: echo "EXPIRES_AT=$(date -u -d '+90 days' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      # ── GoReleaser handles the build, packaging, signing, and release ──
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPIRES_AT: ${{ env.EXPIRES_AT }}
