name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write    # Required for SARIF upload to GitHub Security tab

env:
  GO_VERSION: "1.22"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # govulncheck: Go-aware vulnerability scanning (ADR 0014)
  # Reports only vulnerabilities reachable by our code; zero false positives.
  # ─────────────────────────────────────────────────────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -show verbose ./...

  # ─────────────────────────────────────────────────────────────────────
  # CodeQL: GitHub's semantic SAST (ADR 0014)
  # Free for public repos. Catches taint flow / control flow issues.
  # ─────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, python]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────────────────────────────
  # Trivy: container image scanning (ADR 0014)
  # Runs only on tags or main; not on every PR to avoid noise.
  # ─────────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy (image scan)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Build leoflow-server image
        run: |
          docker build -t leoflow-server:scan -f deploy/Dockerfile.server .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: leoflow-server:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─────────────────────────────────────────────────────────────────────
  # Gitleaks: secret scanning
  # ─────────────────────────────────────────────────────────────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
