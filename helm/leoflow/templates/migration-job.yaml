{{- if .Values.migrations.enabled -}}
{{/*
Runs golang-migrate before the server starts, as a pre-install/pre-upgrade hook.
The default image (ghcr.io/neochaotic/leoflow-migrate, built from
deploy/Dockerfile.migrate via `make migrate-image`) bundles the Leoflow
migrations at .Values.migrations.path. Override migrations.image to use your own,
or set migrations.enabled=false to migrate out of band.
*/}}
{{- $migrateTag := .Values.migrations.image.tag | default .Chart.AppVersion -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "leoflow.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leoflow.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "leoflow.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository }}:{{ $migrateTag }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          args:
            - "-path={{ .Values.migrations.path }}"
            - "-database=$(LEOFLOW_DATABASE_URL)"
            - "up"
          env:
            - name: LEOFLOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (include "leoflow.secretName" .) }}
                  key: databaseUrl
{{- end -}}
