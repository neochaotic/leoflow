{{/*
A chart-managed Secret holds any credentials provided inline in values (and not
via an existingSecret). Keys are only included when an inline value is set.
*/}}
{{- $needsDB := and (not .Values.database.existingSecret) .Values.database.url -}}
{{- $needsRedis := and (not .Values.redis.existingSecret) .Values.redis.url -}}
{{- $needsJWT := and (not .Values.auth.existingSecret) .Values.auth.jwtSecret -}}
{{- $needsBootstrap := and (not .Values.bootstrap.existingSecret) .Values.bootstrap.password -}}
{{- if or $needsDB $needsRedis $needsJWT $needsBootstrap -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leoflow.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leoflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needsDB }}
  databaseUrl: {{ .Values.database.url | quote }}
  {{- end }}
  {{- if $needsRedis }}
  redisUrl: {{ .Values.redis.url | quote }}
  {{- end }}
  {{- if $needsJWT }}
  jwtSecret: {{ .Values.auth.jwtSecret | quote }}
  {{- end }}
  {{- if $needsBootstrap }}
  bootstrapPassword: {{ .Values.bootstrap.password | quote }}
  {{- end }}
{{- end -}}
