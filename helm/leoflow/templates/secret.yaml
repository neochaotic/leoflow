{{/*
A chart-managed Secret holds any credentials provided inline in values (and not
via an existingSecret). Keys are only included when an inline value is set.
*/}}
{{- $needsDB := and (not .Values.database.existingSecret) .Values.database.url -}}
{{- $needsRedis := and (not .Values.redis.existingSecret) .Values.redis.url -}}
{{- $needsJWT := and (not .Values.auth.existingSecret) .Values.auth.jwtSecret -}}
{{- $needsBootstrap := and (not .Values.bootstrap.existingSecret) .Values.bootstrap.password -}}
{{- $needsSecretKey := and (not .Values.secretKeyExistingSecret) .Values.secretKey -}}
{{- if or $needsDB $needsRedis $needsJWT $needsBootstrap $needsSecretKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leoflow.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leoflow.labels" . | nindent 4 }}
  annotations:
    # Run before the migration Job (hook-weight 0) so the Job's env can
    # read LEOFLOW_DATABASE_URL via secretKeyRef on first install. Without
    # this annotation the Secret is part of the normal release manifest,
    # which Helm applies *after* hooks — the pre-install migration Job
    # then fails to start with `secret "leoflow-secrets" not found`. The
    # default `before-hook-creation` delete policy replaces stale hook
    # state on reinstall but keeps the Secret around after success so the
    # Deployment (a non-hook resource) can reference it.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
type: Opaque
stringData:
  {{- if $needsDB }}
  databaseUrl: {{ .Values.database.url | quote }}
  {{- end }}
  {{- if $needsRedis }}
  redisUrl: {{ .Values.redis.url | quote }}
  {{- end }}
  {{- if $needsJWT }}
  jwtSecret: {{ .Values.auth.jwtSecret | quote }}
  {{- end }}
  {{- if $needsBootstrap }}
  bootstrapPassword: {{ .Values.bootstrap.password | quote }}
  {{- end }}
  {{- if $needsSecretKey }}
  secretKey: {{ .Values.secretKey | quote }}
  {{- end }}
{{- end -}}
