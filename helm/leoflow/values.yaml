# Default values for the Leoflow control plane chart.

image:
  repository: ghcr.io/neochaotic/leoflow-server
  tag: ""              # defaults to .Chart.appVersion when empty
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicaCount: 1        # the scheduler leader-elects, so >1 is safe (HA API + one active scheduler)

# taskNamespace is where the control plane creates task pods. It MUST match the
# namespace the server expects (the code currently targets "leoflow"); the chart
# grants the control plane RBAC to manage pods here.
taskNamespace: leoflow

serviceAccount:
  create: true
  name: ""             # defaults to the fullname when empty
  annotations: {}

rbac:
  # create a Role/RoleBinding letting the control plane create/watch/delete task
  # pods (and read their logs) in taskNamespace — the pod-per-task executor.
  create: true

# Ports the server listens on (must match server.*Addr below).
ports:
  http: 8080
  metrics: 9090
  grpc: 9091

service:
  type: ClusterIP
  annotations: {}

# config maps to LEOFLOW_* env. Non-secret settings live here; secrets below.
config:
  logsDir: /var/log/leoflow
  scheduler:
    enabled: true
    loopIntervalMs: 1000
  cors:
    allowedOrigins:
      - "*"
  # agentControlPlaneAddr is what task pods dial back for gRPC. Defaults to the
  # in-cluster Service DNS on the gRPC port when left empty.
  agentControlPlaneAddr: ""

# Database (Postgres). Provide an external URL, or a pre-existing secret.
database:
  url: ""              # postgres://user:pass@host:5432/leoflow?sslmode=disable
  existingSecret: ""   # name of a Secret with key databaseUrl (overrides url)
  maxOpenConns: 20
  maxIdleConns: 5

# Redis (XCom + locks).
redis:
  url: ""              # redis://host:6379/0
  existingSecret: ""   # name of a Secret with key redisUrl (overrides url)

auth:
  # jwtSecret signs API + agent tokens. Set it, or reference an existing secret.
  jwtSecret: ""
  existingSecret: ""   # name of a Secret with key jwtSecret (overrides jwtSecret)
  tokenTtlSeconds: 3600

# bootstrap creates the initial admin user on first start when set.
bootstrap:
  password: ""         # leave empty to skip; or reference existingSecret/key bootstrapPassword
  existingSecret: ""

# migrations runs golang-migrate as a pre-install/pre-upgrade hook Job before the
# server starts. The image must contain the migrations and migrate binary.
migrations:
  enabled: true
  image:
    # leoflow-migrate bundles the Leoflow migrations + golang-migrate
    # (deploy/Dockerfile.migrate, built by `make migrate-image`). Tag defaults to
    # the chart appVersion.
    repository: ghcr.io/neochaotic/leoflow-migrate
    tag: ""
    pullPolicy: IfNotPresent
  # path of the migrations dir inside the image.
  path: /migrations

# TLS for the agent <-> control plane gRPC channel (issue #58). Off by default
# (the per-task token still authenticates each call). When enabled, the control
# plane serves gRPC over TLS using serverCertSecret, and task pods mount caConfigMap
# so the agent verifies the server cert. Typically both are produced by
# cert-manager (a Certificate Secret + a trust-bundle/CA ConfigMap).
agentTLS:
  enabled: false
  # Secret (type kubernetes.io/tls) with tls.crt/tls.key for the gRPC server —
  # e.g. created by a cert-manager Certificate. Required when enabled.
  serverCertSecret: ""
  # ConfigMap with key ca.crt, mounted into task pods to verify the server cert.
  caConfigMap: ""

observability:
  otel:
    enabled: false
    endpoint: ""
  logFormat: json
  logLevel: info

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: leoflow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}

# ── Production hardening (DRAFT) — all OFF by default; opt in per environment. ──

# HorizontalPodAutoscaler. Safe with the leader-elected scheduler (ADR 0009):
# extra replicas serve the API/UI while one scheduler stays active.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""
  behavior: {}

# PodDisruptionBudget so node drains/upgrades keep the API available (needs
# replicaCount > 1). Set one of minAvailable / maxUnavailable.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# NetworkPolicy for the control plane (requires a CNI that enforces it). See the
# template header — egress defaults to permissive so enabling it never silently
# breaks DB/Redis/kube-apiserver access; tighten per environment.
networkPolicy:
  enabled: false
  ingressFrom: []   # e.g. [{namespaceSelector: {}}] to allow same-namespace clients + task pods
  metricsFrom: []   # e.g. [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: monitoring}}}]
  egress: []        # explicit egress rules; empty = allow-all (besides DNS, always allowed)

# Prometheus Operator ServiceMonitor for /metrics (ADR 0010). Requires the
# kube-prometheus-stack CRDs.
metrics:
  serviceMonitor:
    enabled: false
    namespace: ""           # defaults to the release namespace
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}    # e.g. {release: kube-prometheus-stack} to match the Prometheus selector
