site_name: Leoflow
site_description: GitOps-first, container-native workflow orchestrator (Airflow-compatible UI)
site_url: https://neochaotic.github.io/leoflow/
repo_url: https://github.com/neochaotic/leoflow
repo_name: neochaotic/leoflow
edit_uri: edit/main/docs/
docs_dir: docs
copyright: Apache-2.0 · Leoflow
# Flat URLs keep relative asset paths (the Scalar spec) predictable under Pages.
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  logo: assets/icon-256.png
  favicon: assets/icon-256.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight

plugins:
  - search
  # Social preview cards (Open Graph). Needs imaging deps (cairo); enabled only in
  # CI where the workflow installs them, so local builds work without cairo.
  - social:
      enabled: !ENV [CI, false]
  # Render Python docstrings (the task runtime) into the API reference.
  - mkdocstrings:
      # Override the source block so "Source code in <path>" links to GitHub
      # (parity with the Go reference, which links every symbol to its source).
      custom_templates: mkdocs_templates
      handlers:
        python:
          paths: [runtime/python]
          options:
            show_root_heading: true
            show_source: true
            heading_level: 2

validation:
  nav: { omitted_files: ignore }
  links: { absolute_links: ignore }

# Repo-only material that lives under docs/ but is not part of the published site
# (the agent context template; reverse-engineering reference fixtures). Keeping
# them here stops them from being built as orphan, unlinked HTML pages.
exclude_docs: |
  agent-templates/
  reference/airflow-real/

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc: { permalink: true }
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed: { alternate_style: true }
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Why Leoflow: why-leoflow.md
  - Get started:
      - Editions: editions.md
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Operating modes: operating-modes.md
      - Concepts & glossary: concepts.md
      - Architecture: architecture.md
  - Authoring & deploy:
      - DAG authoring: dag-authoring.md
      - CI/CD & deploy examples: deploy.md
  - Reference:
      - reference.md
      - CLI reference: cli/leoflow.md
      - Go packages (GoDocs):
          - Overview: go-api.md
          - internal/domain: go/internal/domain.md
          - internal/scheduler: go/internal/scheduler.md
          - internal/executor: go/internal/executor.md
          - internal/dispatch: go/internal/dispatch.md
          - internal/agent: go/internal/agent.md
          - internal/agentrpc: go/internal/agentrpc.md
          - internal/storage: go/internal/storage.md
          - internal/auth: go/internal/auth.md
          - internal/config: go/internal/config.md
          - internal/cli: go/internal/cli.md
          - internal/api: go/internal/api.md
      - Python runtime API: python-api.md
      - HTTP API (Scalar): api-reference.html
      - Configuration: configuration.md
  - Guides:
      - The leoflow dev workflow: dev-workflow.md
      - Examples: examples.md
      - "Case study: 1 GB ETL on staging": etl-staging-case-study.md
      - Variables & Connections: variables-connections.md
      - Troubleshooting & observability: troubleshooting.md
      - UI compatibility: ui-compatibility.md
      - Staging volume: staging-volume.md
  - Project:
      - Roadmap: roadmap-to-release.md
      - Contributing: contributing.md
      - Architecture decisions (ADRs): adrs.md
      - Background:
          - MVP reverse analysis: reverse-analysis-mvp.md
          - UI walk report: ui-walk-report.md
